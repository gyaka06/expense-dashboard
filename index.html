<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        canvas {
            max-width: 400px;
        }
    </style>
</head>
<body>

<h1>Expense Dashboard</h1>

<div class="card">
    <h3>Total Spent</h3>
    <p id="total"></p>
</div>

<div class="card">
    <h3>Spending by Budget</h3>
    <canvas id="chart"></canvas>
</div>

<script>
const expensesUrl = "https://raw.githubusercontent.com/gyaka06/expense-dashboard/refs/heads/main/expenses.json";
const budgetUrl = "https://raw.githubusercontent.com/gyaka06/expense-dashboard/refs/heads/main/monthlyBudgets.json";

Promise.all
([
    fetch(expensesUrl).then(res => res.json()),
    fetch(budgetsUrl).then(res => res.json())
])
.then(([expenses, budgets]) => 
{
    let total = 0;
    let categories = {};

    expenses.forEach(e => 
    {
        total += e.Amount;

        if (!categories[e.Budget]) {
            categories[e.Budget] = 0;
        }

        categories[e.Budget] += e.Amount;
    });

    document.getElementById("total").innerText = total;

    // 👉 aktuális hónap
    const now = new Date();
    const currentMonth = now.getMonth() + 1;
    const currentYear = now.getFullYear();

    const currentBudget = budgets.find(b =>
        b.Month === currentMonth && b.Year === currentYear
    );

    if (currentBudget) {
        const savingsRemaining = currentBudget.Savings - (categories["Savings"] || 0);
        const funRemaining = currentBudget.Fun - (categories["Fun"] || 0);
        const livingRemaining = currentBudget.Living - (categories["Living"] || 0);

        document.getElementById("savings").innerText = savingsRemaining;
        document.getElementById("fun").innerText = funRemaining;
        document.getElementById("living").innerText = livingRemaining;
    }

    // chart marad
    const ctx = document.getElementById('chart');

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: Object.keys(categories),
            datasets: [{
                data: Object.values(categories)
            }]
        }
    });
});
</script>

</body>
</html>
