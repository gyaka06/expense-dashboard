<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>(S)expense Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Consolas;
            background: #000000;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2323FF;
        }
        .card {
            background: #D3D3D3;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            color: #2323FF;
        }
        .total-value {
            color: #85BB65;
            font-weight: bold;
        }

        h3 {
            margin-bottom: 5px;
        }
        
        canvas {
            max-width: 400px;
            margin-top: 0px;
            max-height: 400px;
        }
    </style>
</head>
<body>

<h1>(S)expense Dashboard</h1>

<div class="card">
    <h3>Total Spent</h3>
    <p class="total-value" id="total"></p>
</div>

<div class="card">
    <h3>Spending by Budget</h3>
    <canvas id="chart"></canvas>
</div>

<script>
const expensesUrl = "https://raw.githubusercontent.com/gyaka06/expense-dashboard/refs/heads/main/expenses.json";
const budgetsUrl = "https://raw.githubusercontent.com/gyaka06/expense-dashboard/refs/heads/main/monthlyBudgets.json";

function formatNumber(num) {
    return new Intl.NumberFormat('hu-HU').format(num);
}

Promise.all
([
    fetch(expensesUrl).then(res => res.json()),
    fetch(budgetsUrl).then(res => res.json())
])
.then(([expenses, budgets]) => 
{
    let total = 0;
    let categories = {};

    expenses.forEach(e => 
    {
        total += e.Amount;

        if (!categories[e.Budget]) {
            categories[e.Budget] = 0;
        }

        categories[e.Budget] += e.Amount;
    });

    document.getElementById("total").innerText = formatNumber(total);

    // 👉 aktuális hónap
    const now = new Date();
    const currentMonth = now.getMonth() + 1;
    const currentYear = now.getFullYear();

    const currentBudget = budgets.find(b =>
        b.Month === currentMonth && b.Year === currentYear
    );

    if (currentBudget) {
        const savingsRemaining = currentBudget.SavingsBudget - (categories["Savings"] || 0);
        const funRemaining = currentBudget.FunBudget - (categories["Fun"] || 0);
        const livingRemaining = currentBudget.LivingBudget - (categories["Living"] || 0);

        document.getElementById("savings").innerText = formatNumber(savingsRemaining);
        document.getElementById("fun").innerText = formatNumber(funRemaining);
        document.getElementById("living").innerText = formatNumber(livingRemaining);
    }

    // chart marad
    const ctx = document.getElementById('chart');

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: Object.keys(categories),
            datasets: [{
                data: Object.values(categories)
            }]
        }
    });
});
</script>

<div class="card">
    <h3>Remaining Budget</h3>
    <p>Savings: <span id="savings"></span></p>
    <p>Fun: <span id="fun"></span></p>
    <p>Living: <span id="living"></span></p>
</div>
    
</body>
</html>
