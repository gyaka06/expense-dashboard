<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .card {
            background: white;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        canvas {
            max-width: 400px;
        }
    </style>
</head>
<body>

<h1>Expense Dashboard</h1>

<div class="card">
    <h3>Total Spent</h3>
    <p id="total"></p>
</div>

<div class="card">
    <h3>Spending by Budget</h3>
    <canvas id="chart"></canvas>
</div>

<script>
const expensesUrl = "https://github.com/gyaka06/expense-dashboard/blob/main/expenses.json";

fetch(expensesUrl)
    .then(res => res.json())
    .then(data => {

        let total = 0;
        let categories = {};

        data.forEach(e => {
            total += e.Amount;

            if (!categories[e.Budget]) {
                categories[e.Budget] = 0;
            }

            categories[e.Budget] += e.Amount;
        });

        document.getElementById("total").innerText = total;

        const ctx = document.getElementById('chart');

        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: Object.keys(categories),
                datasets: [{
                    data: Object.values(categories)
                }]
            }
        });
    });
</script>

</body>
</html>
